<!DOCTYPE html>
<html>
<head>
  <title>Select Role</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>

  body {
    background: url("./assets/background_login.jpg") no-repeat center center/cover;
    color: white;
    font-family: 'Segoe UI', sans-serif;
  }

  body::before {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(96,165,250,0.15), transparent 70%);
    top: 10%;
    left: 20%;
    z-index: -1;
  }

  body::after {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,0.1), transparent 70%);
    bottom: 10%;
    right: 10%;
    z-index: -1;
  }

  /* HERO */
  .hero {
    padding: 80px 20px 30px;
    text-align: center;
  }

  .hero h1 {
    font-size: 3rem;
    font-weight: bold;
  }

  .hero span {
    color: #60a5fa;
  }

  /* BIG CARD */
  .glass {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 40px;
    max-width: 520px;
    margin: auto;
    transition: 0.3s;
  }

  .glass:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px rgba(96,165,250,0.3);
  }

  /* BUTTONS */
  .btn-role {
    padding: 16px;
    font-size: 18px;
    border-radius: 12px;
  }

  .btn-glow {
    background: #1e3a8a;
    color: white;
    border: none;
  }

  .btn-glow:hover {
    background: #3b82f6;
    box-shadow: 0 0 15px #60a5fa;
  }

  </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Who<span>Are</span>You?</h1>
  <p class="text-light">Choose your role to get started</p>
</div>

<!-- BIG CENTER CARD -->
<div class="container d-flex justify-content-center">

  <div class="glass text-center">

    <h5 class="mb-4 text-light">Select your role</h5>

    <button class="btn btn-glow btn-role w-100 mb-3" onclick="selectRole('company')">
      Hiring Company
    </button>

    <button class="btn btn-outline-light btn-role w-100" onclick="selectRole('jobseeker')">
      Job Seeker
    </button>

  </div>

</div>

<script>
function selectRole(role) {
  localStorage.clear();
  localStorage.setItem("role", role);

  if (role === "company") {
    window.location.href = "company_login.html";
  } else {
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
