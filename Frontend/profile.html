<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #020617, #0e254d);
      color: white;
    }

    .card-custom {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .cover {
      height: 180px;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      border-radius: 15px 15px 0 0;
    }

    .profile-img {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  margin-top: -70px;
  border: 4px solid #0e254d;
  object-fit: cover;
  box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}

    .badge-skill {
      background: #1e3a8a;
      margin: 3px;
    }

    .match-bar {
      height: 6px;
      background: #3b82f6;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container mt-4">

  <div class="row">

    <!-- LEFT -->
    <div class="col-lg-8">

      <!-- Profile -->
      <div class="card-custom p-0">
        <div class="cover"></div>

        <div class="p-3">
  <img src="assets/image.jpg" class="profile-img">
  <h3 id="name">Loading...</h3>
</div>
      </div>

      <!-- Matches -->
      <div class="card-custom">
        <h5>Top Job Matches</h5>
        <div id="matchContainer"></div>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="col-lg-4">

      <!-- Skills -->
      <div class="card-custom">
        <h5>Skills</h5>
        <div id="skillsContainer"></div>
      </div>

      
    </div>

  </div>

</div>

<script>

document.addEventListener("DOMContentLoaded", () => {
  const userId = localStorage.getItem("user_id") || 1;

  loadProfile(userId);
  loadMatches(userId);
  loadProgress(userId);
});


// =======================
// PROFILE
// =======================
function loadProfile(userId) {
  fetch(`http://localhost:3000/profile/${userId}`)
    .then(res => res.json())
    .then(data => {

      document.getElementById("name").innerText = data.name || "No Name";

      let html = "";

      if (!data.skills || data.skills.length === 0) {
        html = "No skills";
      } else {
        data.skills.forEach(s => {
          html += `<span class="badge badge-skill">${s}</span>`;
        });
      }

      document.getElementById("skillsContainer").innerHTML = html;
    });
}


// =======================
// MATCHES
// =======================
function loadMatches(userId) {

  fetch(`http://localhost:3000/recommended-jobs/${userId}`)
    .then(res => res.json())
    .then(data => {

      const container = document.getElementById("matchContainer");

      let html = "";

      data.slice(0,3).forEach(job => {

        const percent = Math.round(job.match_score || 0);
        const missing = job.missing_skills || [];

        html += `
        <div class="mb-3 p-3" style="background:rgba(255,255,255,0.05); border-radius:10px;">
          
          <strong>${job.title}</strong>
          <p>${job.company_name}</p>

          <small>${percent}% match</small>
          <div class="match-bar" style="width:${percent}%"></div>

          ${
            missing.length > 0
            ? `
               ${missing.length} skill away!

              ${missing.map(skill => `
                <div class="mt-2">

                  <b>${skill}</b><br>

                  <button class="btn btn-warning btn-sm"
                    onclick="learnSkills('${skill}')">
                    ▶ Learn
                  </button>

                  <button class="btn btn-success btn-sm"
                    onclick="markLearned('${skill}')">
                      Mark as learned
                  </button>

                </div>
              `).join("")}
            `
            : `<div style="color:lightgreen;">Ready to Apply </div>`
          }

        </div>
        `;
      });

      container.innerHTML = html;
    });
}


// =======================
// LEARN (SAFE VERSION)
// =======================
function learnSkills(skill) {
  const query = encodeURIComponent(skill + " tutorial");

  window.open(`https://www.youtube.com/results?search_query=${query}`, "_blank");
}


// =======================
// MARK LEARNED
// =======================
function markLearned(skill) {
  const userId = localStorage.getItem("user_id") || 1;

  fetch('http://localhost:3000/mark-learned', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      user_id: userId,
      skill_name: skill
    })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);

    // simple + reliable
    location.reload();
  });
}


// =======================
// PROGRESS
// =======================
function loadProgress(userId) {
  fetch(`http://localhost:3000/learning-progress/${userId}`)
    .then(res => res.json())
    .then(data => {

      document.getElementById("progressText").innerText =
        `${data.percent}% completed`;

      document.getElementById("progressBar").style.width =
        data.percent + "%";
    });
}

</script>

</body>
</html>
