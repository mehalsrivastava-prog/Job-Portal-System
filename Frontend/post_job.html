<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Job</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #020617, #0a1f44);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

/* Buttons */
.btn-glow {
  background: #1e3a8a;
  color: white;
}

.btn-glow:hover {
  background: #3b82f6;
  box-shadow: 0 0 10px #60a5fa;
}

/* Inputs */
.form-control {
  background: rgba(255,255,255,0.05);
  border: none;
  color: white;
}

.form-control::placeholder {
  color: #94a3b8;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand text-white" href="#">JobSearch</a>


  </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

  <h2 class="mb-4">Post New Job</h2>

  <div class="row">

    <div class="col-md-6">

      <input id="title" class="form-control mb-3" placeholder="Job Title">

      <input id="salary" class="form-control mb-3" placeholder="Salary (e.g. 9.1LPA)">

      <input id="location" class="form-control mb-4" placeholder="Location">

      <input id="skills" class="form-control mb-4" placeholder="Skills (e.g. React, JavaScript, SQL)">

      <button onclick="submitJob()" class="btn btn-glow">
         Submit
        </button>

    </div>

  </div>

</div>

<script>
async function submitJob() {
  console.log("CLICKED");

  const title = document.getElementById("title").value;
  const salaryInput = document.getElementById("salary").value;
  const location = document.getElementById("location").value;
  const skillsInput = document.getElementById("skills").value;

  if (!title || !salaryInput || !location || !skillsInput) {
    alert("Fill all fields");
    return;
  }

  // salary conversion
  let salary;
  if (salaryInput.toLowerCase().includes("lpa")) {
    salary = parseFloat(salaryInput.toLowerCase().replace("lpa", "")) * 100000;
  } else {
    salary = parseFloat(salaryInput);
  }

  if (isNaN(salary)) {
    alert("Invalid salary");
    return;
  }

  //convert skills string → array
  const skills = skillsInput.split(",").map(s => s.trim());

  const company_id = localStorage.getItem("company_id");

  // DEBUG (correct place)
  console.log({
    company_id,
    title,
    salary,
    location,
    skills
  });

  try {
    const res = await fetch("http://localhost:3000/add-job", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        company_id,
        title,
        salary,
        location,
        skills
      })
    });

    const data = await res.json();

    console.log("Response:", data);

    if (data.success) {
      alert("Job posted ");
      window.location.href = "company-dashboard.html";
    } else {
      alert("Error posting job");
    }

  } catch (err) {
    console.error("Fetch error:", err);
    alert("Server error");
  }
}
</script>

</body>
</html>
