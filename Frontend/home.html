<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
  background: linear-gradient(135deg, #020617, #0a1f44);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}
body::before {
  content: "";
  position: fixed;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(96,165,250,0.15), transparent 70%);
  top: 10%;
  left: 20%;
  z-index: -1;
}

body::after {
  content: "";
  position: fixed;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(59,130,246,0.1), transparent 70%);
  bottom: 10%;
  right: 10%;
  z-index: -1;
}

/* Navbar */
.navbar {
  background: transparent;
}

.navbar-brand {
  color: #60a5fa !important;
  font-weight: bold;
}

/* Hero */
.hero {
  padding: 60px 20px 30px;
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  font-weight: bold;
}

.hero span {
  color: #60a5fa;
}

/* Glass Cards */
.glass {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 20px;
  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(96,165,250,0.3);
}

/* Buttons */
.btn-glow {
  background: #1e3a8a;
  color: white;
  border: none;
}

.btn-glow:hover {
  background: #3b82f6;
  box-shadow: 0 0 15px #60a5fa;
}

/* Search bar */
.search-box {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
}

/* Results */
#results {
  margin-top: 40px;
}

/* Footer */
footer {
  opacity: 0.6;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand text-white" href="#"></a>

    <div class="d-flex gap-4">
      <a href="profile.html" class="text-white nav-link">Profile</a>
      <a href="companies.html" class="text-white nav-link">Companies</a>
      <a href="job-listings.html" class="text-white nav-link">Dashboard</a>
    </div>

  </div>
</nav>

<!-- HERO (CENTERED ONLY TITLE) -->
<div class="hero">
  <h1>Job<span>Search</span></h1>
  <p class="text-light">Scroll less. Work smarter. Get hired faster.</p>
</div>

<!-- MAIN LAYOUT -->
<div class="container">
  <div class="row">

    <!-- 🔹 LEFT SIDE (2/3) -->
    <div class="col-md-8">

      <!-- SEARCH BAR -->
      <div class="row mb-4">
        <div class="col-md-8">
          <input type="text" id="searchInput" class="form-control search-box" placeholder="Search jobs...">
        </div>
        <div class="col-md-4">
          <button id="searchBtn" class="btn btn-glow w-100">Search</button>
        </div>
      </div>

      <!-- RESULTS -->
      <div class="row" id="resultsContainer"></div>

    </div>

    <!-- 🔹 RIGHT SIDE (1/3 DASHBOARD) -->
    <div class="col-md-4">

      <!-- TOP PAYING JOBS -->
      <div class="glass mb-4">
        <h5>Top Paying Jobs</h5>
        <ul id="topJobs" class="list-unstyled mt-3"></ul>
      </div>

      <!-- TOP COMPANIES -->
      <div class="glass">
        <h5>Top Companies</h5>
        <ul id="topCompanies" class="list-unstyled mt-3"></ul>
      </div>

    </div>

  </div>
</div>
<script>
const API_URL = "http://localhost:3000";

const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const resultsContainer = document.getElementById("resultsContainer");

searchBtn.addEventListener("click", searchJobs);

searchInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    searchJobs();
  }
});

function searchJobs() {
  const query = searchInput.value;

  console.log("Searching:", query);

  fetch(`${API_URL}/search-jobs?q=${encodeURIComponent(query)}`)
    .then(res => res.json())
    .then(data => {
      console.log("Results:", data);
      displayResults(data);
    })
    .catch(err => console.error(err));
}

function displayResults(jobs) {
  resultsContainer.innerHTML = "";

  if (jobs.length === 0) {
    resultsContainer.innerHTML = "<p>No jobs found </p>";
    return;
  }

  jobs.forEach(job => {
    resultsContainer.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="glass">
          <h5>${job.title}</h5>
          <p class="text-secondary">${job.company_name}</p>
          <p>${job.location || "Remote"}</p>
          <button class="btn btn-glow btn-sm" onclick="applyJob(${job.job_id})">
            Apply
          </button>
        </div>
      </div>
    `;
  });
}

function applyJob(jobId) {
  const user_id = localStorage.getItem("user_id");

  fetch(`${API_URL}/apply`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ user_id, job_id: jobId })
  })
  .then(res => res.json())
  .then(data => alert(data.message || "Applied!"));
}

// Load sidebar data on page load
window.onload = () => {
  loadTopJobs();
  loadTopCompanies();
};
function formatLPA(salary) {
  return (salary / 100000).toFixed(1) + " LPA";
}
function loadTopJobs() {
  fetch(`${API_URL}/top-jobs`)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("topJobs");
      container.innerHTML = "";

      data.forEach(job => {
        container.innerHTML += `
          <li class="mb-2">
            <strong>${job.title}</strong><br>
            <span class="text-success">₹${formatLPA(job.salary)}</span>
          </li>
        `;
      });
    });
}

function loadTopCompanies() {
  fetch(`${API_URL}/top-companies`)
    .then(res => res.json())
    .then(data => {
      const container = document.getElementById("topCompanies");
      container.innerHTML = "";

      data.forEach(company => {
        container.innerHTML += `
          <li class="mb-2">
            ${company.company_name}
            <span class="text-info">(${company.total_jobs})</span>
          </li>
        `;
      });
    });
}
</script>
</body>
</html>
