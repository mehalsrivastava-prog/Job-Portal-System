<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funky Job Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
  background: linear-gradient(135deg, #020617, #0a1f44);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
.navbar {
  background: transparent;
}

.navbar-brand {
  color: #60a5fa !important;
  font-weight: bold;
}

/* Hero */
.hero {
  padding: 100px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  font-weight: bold;
}

.hero span {
  color: #60a5fa;
}

/* Glass Cards */
.glass {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 20px;
  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(96,165,250,0.3);
}

/* Buttons */
.btn-glow {
  background: #1e3a8a;
  color: white;
  border: none;
}

.btn-glow:hover {
  background: #3b82f6;
  box-shadow: 0 0 15px #60a5fa;
}

/* Search bar */
.search-box {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
}

/* Results */
#results {
  margin-top: 40px;
}

/* Footer */
footer {
  opacity: 0.6;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand text-white" href="#">JobSearch</a>

    <div class="d-flex gap-4">
      <a href="profile.html" class="text-white nav-link">Profile</a>
      <a href="companies.html" class="text-white nav-link">Companies</a>
      <a href="job-listings.html" class="text-white nav-link">Dashboard</a>
    </div>

  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Find Jobs That <span>Don’t Suck</span></h1>
  <p class="text-light">Scroll less. Work smarter. Get hired faster.</p>

  <div class="row justify-content-center mt-4">
    <div class="col-md-4">
      <input type="text" id="searchInput" class="form-control search-box" placeholder="Search jobs...">
    </div>
    <div class="col-md-2">
      <button id="searchBtn" class="btn btn-glow w-100">Search</button>
    </div>
  </div>
</div>

<!-- 🔥 SEARCH RESULTS -->
<div class="container" id="results">
  <div class="row" id="resultsContainer"></div>
</div>

<script>
const API_URL = "http://localhost:3000";

const searchBtn = document.getElementById("searchBtn");
const searchInput = document.getElementById("searchInput");
const resultsContainer = document.getElementById("resultsContainer");

searchBtn.addEventListener("click", searchJobs);

searchInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    searchJobs();
  }
});

function searchJobs() {
  const query = searchInput.value;

  console.log("Searching:", query);

  fetch(`${API_URL}/search-jobs?q=${encodeURIComponent(query)}`)
    .then(res => res.json())
    .then(data => {
      console.log("Results:", data);
      displayResults(data);
    })
    .catch(err => console.error(err));
}

function displayResults(jobs) {
  resultsContainer.innerHTML = "";

  if (jobs.length === 0) {
    resultsContainer.innerHTML = "<p>No jobs found 😢</p>";
    return;
  }

  jobs.forEach(job => {
    resultsContainer.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="glass">
          <h5>${job.title}</h5>
          <p class="text-secondary">${job.company_name}</p>
          <p>${job.location || "Remote"}</p>
          <button class="btn btn-glow btn-sm" onclick="applyJob(${job.job_id})">
            Apply
          </button>
        </div>
      </div>
    `;
  });
}

function applyJob(jobId) {
  const user_id = localStorage.getItem("user_id");

  fetch(`${API_URL}/apply`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ user_id, job_id: jobId })
  })
  .then(res => res.json())
  .then(data => alert(data.message || "Applied!"));
}
</script>
</body>
</html>
