<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Funky Job Portal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
  background: linear-gradient(135deg, #020617, #0a1f44);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
.navbar {
  background: transparent;
}

.navbar-brand {
  color: #60a5fa !important;
  font-weight: bold;
}

/* Hero */
.hero {
  padding: 100px 20px;
  text-align: center;
}

.hero h1 {
  font-size: 3rem;
  font-weight: bold;
}

.hero span {
  color: #60a5fa;
}

/* Glass Cards */
.glass {
  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  padding: 20px;
  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(96,165,250,0.3);
}

/* Buttons */
.btn-glow {
  background: #1e3a8a;
  color: white;
  border: none;
}

.btn-glow:hover {
  background: #3b82f6;
  box-shadow: 0 0 15px #60a5fa;
}

/* Search bar */
.search-box {
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
}

/* Footer */
footer {
  opacity: 0.6;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand text-white" href="#">JobSearch</a>

    <div class="d-flex gap-4">
      <a href="profile.html" class="text-white nav-link">Profile</a>
      <a href="companies.html" class="text-white nav-link">Companies</a>
      <a href="job-listings.html" class="text-white nav-link">Dashboard</a>
    </div>

  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Find Jobs That <span>Don’t Suck</span></h1>
  <p class="text-light">Scroll less. Work smarter. Get hired faster.</p>

  <div class="row justify-content-center mt-4">
    <div class="col-md-4">
      <input type="text" class="form-control search-box" placeholder="Search jobs...">
    </div>
    <div class="col-md-2">
      <button class="btn btn-glow w-100">Search</button>
    </div>
  </div>
</div>

<!-- JOB CARDS -->
<div class="container mt-5">
  <div class="row">

    <div class="col-md-4">
      <div class="glass">
        <h5>Frontend Developer</h5>
        <p class="text-secondary">Startup Vibe 🚀</p>
        <p>Remote</p>
        <button class="btn btn-glow btn-sm">Apply</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="glass">
        <h5>Backend Engineer</h5>
        <p class="text-secondary">Big Tech 💻</p>
        <p>Bangalore</p>
        <button class="btn btn-glow btn-sm">Apply</button>
      </div>
    </div>

    <div class="col-md-4">
      <div class="glass">
        <h5>UI/UX Designer</h5>
        <p class="text-secondary">Creative Agency 🎨</p>
        <p>Remote</p>
        <button class="btn btn-glow btn-sm">Apply</button>
      </div>
    </div>

  </div>
</div>


</body>
</html>
