<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Applications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
  background: linear-gradient(135deg, #020617, #0a1f44);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

/* Glass cards */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 20px;
  margin-bottom: 20px;
}

/* Job card */
.job-card {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
}

/* Status badges */
.status {
  padding: 3px 10px;
  border-radius: 10px;
  font-size: 12px;
}

.applied { background: #1e3a8a; }
.interview { background: #f59e0b; }
.rejected { background: #dc2626; }

/* Buttons */
.btn-glow {
  background: #1e3a8a;
  color: white;
}

.btn-glow:hover {
  background: #3b82f6;
  box-shadow: 0 0 10px #60a5fa;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">

    <a class="navbar-brand text-white" href="#">JobSearch</a>

    <div class="d-flex gap-4">
      <a href="home.html" class="text-white nav-link">Home</a>
      <a href="profile.html" class="text-white nav-link">Profile</a>
      <a href="companies.html" class="text-white nav-link">Companies</a>
      
    </div>

  </div>
</nav>

<div class="container mt-4">

  <h2 class="mb-4">Your Dashboard</h2>
<div class="row mb-4 text-center">

  <div class="col-md-4">
    <div class="glass">
      <h5>Total Jobs</h5>
      <h2 id="totalJobs">0</h2>
    </div>
  </div>

  <div class="col-md-4">
    <div class="glass">
      <h5>Total Companies</h5>
      <h2 id="totalCompanies">0</h2>
    </div>
  </div>

  <div class="col-md-4">
    <div class="glass">
      <h5>Total Applications</h5>
      <h2 id="totalApplications">0</h2>
    </div>
  </div>

</div>
  <div class="row">

    <!-- LEFT: RECOMMENDED JOBS -->
    <div class="col-lg-6">

      <div class="glass">
        <h4 >Recommended for You</h4>
        <p class="text-secondary">Based on your skills</p>

        <!-- JOB -->
       <div id="recommendedJobs"></div>

      </div>

    </div>

    <!-- RIGHT: APPLICATION HISTORY -->
    <div class="col-lg-6">
  <div class="glass">
    <h4>Your Applications</h4>

    <div id="applicationsContainer"></div>

  </div>
</div>

  </div>
  

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const userId = localStorage.getItem("user_id") ||1;

  // ✅ 1. Stats
  fetch(`http://localhost:3000/dashboard/stats/${userId}`)
    .then(res => res.json())
    .then(data => {
      console.log("STATS:", data);

      document.getElementById('totalJobs').innerText = data.total_jobs || 0;
      document.getElementById('totalCompanies').innerText = data.total_companies || 0;
      document.getElementById('totalApplications').innerText = data.total_applications || 0;
    })
    .catch(err => console.error("Stats error:", err));


  // ✅ 2. Recommended Jobs (SAFE)
  fetch(`http://localhost:3000/recommended-jobs/${userId}`)
    .then(res => {
      if (!res.ok) throw new Error("Route not found");
      return res.json();
    })
    .then(data => {
      console.log("RECOMMENDED:", data);

      const container = document.getElementById('recommendedJobs');

      if (!data || data.length === 0) {
        container.innerHTML = "<p>No recommendations yet</p>";
        return;
      }

      let html = "";

      data.forEach(job => {
        const percent = Math.round(job.match_score || 0);

        html += `
          <div class="job-card">
            <h5>${job.title}</h5>
            <p>${job.company_name}</p>

            <small><b>Match: ${percent}%</b></small><br>

            <button class="btn btn-glow btn-sm mt-2" onclick="applyJob(${job.job_id})">
              Apply
            </button>
          </div>
        `;
      });

      container.innerHTML = html;
    })
    .catch(err => {
      console.error("Jobs error:", err);
      document.getElementById('recommendedJobs').innerHTML = "<p>No recommendations available</p>";
    });


  //  3. Applications
  fetch(`http://localhost:3000/dashboard/recent-applications/${userId}`)
    .then(res => res.json())
    .then(data => {
      console.log("APPLICATIONS:", data);

      const container = document.getElementById('applicationsContainer');

      let html = "";

      data.forEach(app => {
        let statusClass = "applied";

        if (app.status === "interview") statusClass = "interview";
        if (app.status === "rejected") statusClass = "rejected";

        html += `
          <div class="job-card">
            <h5>${app.title}</h5>
            <p>${app.company_name}</p>

            <span class="status ${statusClass}">
              ${app.status}
            </span>

            <div class="mt-2">
              <small>${new Date(app.applied_at).toDateString()}</small>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    })
    .catch(err => console.error("Applications error:", err));

});


// ✅ Apply Job
function applyJob(jobId) {
  const userId = localStorage.getItem("user_id");

  fetch('http://localhost:3000/apply', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      user_id: userId,
      job_id: jobId
    })
  })
  .then(res => res.text())
  .then(msg => alert(msg))
  .catch(err => console.error("Apply error:", err));
}
</script>
</body>
</html>
