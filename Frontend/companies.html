<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Companies & Jobs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {
  background: linear-gradient(135deg, #020617, #0a1f44);
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

/* Glass Card */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius: 15px;
  padding: 20px;
  transition: 0.3s;
}

.glass:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 20px rgba(96,165,250,0.3);
}

/* Company title */
.company-name {
  color: #60a5fa;
}

/* Job card inside */
.job {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

/* Buttons */
.btn-glow {
  background: #1e3a8a;
  color: white;
  border: none;
}

.btn-glow:hover {
  background: #3b82f6;
  box-shadow: 0 0 10px #60a5fa;
}

/* Navbar */
.navbar {
  background: transparent;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand text-white" href="#">⚡ JobX</a>

    <div class="ms-auto d-flex gap-4">
      <a href="home.html" class="text-white">Home</a>
      <a href="profile.html" class="text-white">Profile</a>
    </div>
  </div>
</nav>

<!-- PAGE TITLE -->
<div class="container mt-4">
  <h2>Explore Companies & Jobs</h2>
</div>

<!-- COMPANIES -->
<div class="container mt-4">

  <div class="row">

    <!-- COMPANY CARD -->
    <div class="col-md-6 mb-4">
      <div class="glass">

        <h4 class="company-name">Google</h4>
        <p class="text-secondary">Bangalore</p>

        <!-- JOBS -->
        <div class="job">
          <h6>Frontend Developer</h6>
          <p class="mb-1">₹20 LPA</p>
          <p class="text-secondary">Bangalore</p>
          <button class="btn btn-glow btn-sm">Apply</button>
        </div>

        <div class="job">
          <h6>Backend Engineer</h6>
          <p class="mb-1">₹25 LPA</p>
          <p class="text-secondary">Remote</p>
          <button class="btn btn-glow btn-sm">Apply</button>
        </div>

      </div>
    </div>

    <!-- ANOTHER COMPANY -->
    <div class="col-md-6 mb-4">
      <div class="glass">

        <h4 class="company-name">Amazon</h4>
        <p class="text-secondary">Hyderabad</p>

        <div class="job">
          <h6>Software Engineer</h6>
          <p class="mb-1">₹22 LPA</p>
          <p class="text-secondary">Hyderabad</p>
          <button class="btn btn-glow btn-sm">Apply</button>
        </div>

      </div>
    </div>

  </div>

</div>

</body>
</html>
