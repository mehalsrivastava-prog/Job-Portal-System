<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #020617, #0e254d);
      color: white;
    }

    .card-custom {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .cover {
      height: 180px;
      background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      border-radius: 15px 15px 0 0;
    }

    .profile-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      margin-top: -70px;
    }

    .badge-skill {
      background: #1e3a8a;
      margin: 3px;
    }

    .match-bar {
      height: 6px;
      background: #3b82f6;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="container mt-4">

    <div class="row">

      <div class="col-lg-8">

        <!-- Profile -->
        <div class="card-custom p-0">
          <div class="cover"></div>

          <div class="p-3">
            <img src="https://via.placeholder.com/150" class="profile-img">

            <h3 id="name">Loading...</h3>
            <p id="role"></p>
            <p id="location"></p>
          </div>
        </div>

        <!-- Match Score -->
        <div class="card-custom">
          <h5>Top Job Matches</h5>
          <div id="matchContainer"></div>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="col-lg-4">

        <div class="card-custom">
          <h5>Skills</h5>
          <div id="skillsContainer"></div>
        </div>

      </div>

    </div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const userId = localStorage.getItem("user_id");

      // 🔹 PROFILE
      fetch(`http://localhost:3000/profile/${userId}`)
        .then(res => res.json())
        .then(data => {

          document.getElementById("name").innerText = data.name || "No Name";

          const skillsContainer = document.getElementById("skillsContainer");

          let html = "";

          if (!data.skills || data.skills.length === 0) {
            html = "<p>No skills added</p>";
          } else {
            data.skills.forEach(s => {
              html += `<span class="badge badge-skill">${s}</span>`;
            });
          }

          skillsContainer.innerHTML = html;

        })
        .catch(err => console.error("Profile error:", err));


      // 🔥 MATCH SCORE (NOW INSIDE SAME BLOCK)
      fetch(`http://localhost:3000/recommended-jobs/${userId}`)
        .then(res => res.json())
        .then(data => {

          const matchContainer = document.getElementById("matchContainer");

          let html = "";

          if (!data || data.length === 0) {
            matchContainer.innerHTML = "No matches";
            return;
          }

          data.slice(0, 3).forEach(job => {
            const percent = Math.round(job.match_score || 0);

            html += `
          <div class="mb-3">
            <strong>${job.title}</strong>
            <p>${job.company_name}</p>

            <small>${percent}% match</small>
            <div class="match-bar" style="width:${percent}%"></div>

            <div style="font-size: 13px; margin-top: 5px;">
              Skills needed: ${job.missing_skills?.join(", ") || "None"}
            </div>
          </div>
        `;
          });

          matchContainer.innerHTML = html;

        })
        .catch(err => console.error("Match error:", err));

    });
  </script>
</body>

</html>
